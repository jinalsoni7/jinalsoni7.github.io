baseURL = "http://jinalsoni7.github.io/"
title = "Jinal Soni"
theme = "hugo-coder"
languageCode = "en"
defaultContentLanguage = "en"
paginate = 20
enableEmoji = true
relativeURLs = true
canonifyURLs = true

[markup.highlight]
noClasses = false

[params]
author = "Jinal Soni"
description = "Portfolio of Jinal Soni – software engineer transitioning toward research in quantum computing and quantum information theory."
keywords = "quantum computing, quantum information, research, computer science"
info = ["Aspiring Researcher in Quantum Computing and Information"]
avatarURL = "images/avatar.jpg"
dateFormat = "January 2, 2006"

# Right To Left, shift content direction for languagues such as Arabic
rtl = false

# Specify light/dark colorscheme
# Supported values:
# "auto" (use preference set by browser)
# "dark" (dark background, light foreground)
# "light" (light background, dark foreground) (default)
colorScheme = "auto"

# Hide the toggle button, along with the associated vertical divider
hideColorSchemeToggle = false

# Series see also post count
maxSeeAlsoItems = 5

# Custom CSS
customCSS = ["css/custom.css"]

# Custom SCSS, file path is relative to Hugo's asset folder (default: {your project root}/assets)
customSCSS = []

# Custom JS
customJS = []

# Custom remote JS files
customRemoteJS = []

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

